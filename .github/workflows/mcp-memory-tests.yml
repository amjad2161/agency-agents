name: MCP Memory Integration Tests

on:
  pull_request:
    paths:
      - "integrations/mcp-memory/**"
      - "integrations/claude-desktop/**"
      - ".github/workflows/mcp-memory-tests.yml"
  push:
    branches: [main]
    paths:
      - "integrations/mcp-memory/**"
      - "integrations/claude-desktop/**"
      - ".github/workflows/mcp-memory-tests.yml"

jobs:
  validate:
    name: Validate MCP memory integration
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON config files
        run: |
          for f in integrations/claude-desktop/claude_desktop_config.json \
                   integrations/claude-desktop/claude_desktop_config.advanced.json; do
            echo "Checking $f..."
            CONFIG_FILE="$f" node -e "JSON.parse(require('fs').readFileSync(process.env.CONFIG_FILE,'utf8')); console.log('  Valid JSON');"
          done

      - name: Check required keys in claude_desktop_config.json
        run: |
          node - <<'EOF'
          const cfg = JSON.parse(require('fs').readFileSync('integrations/claude-desktop/claude_desktop_config.json','utf8'));
          if (!cfg.mcpServers) throw new Error('Missing mcpServers key');
          if (!cfg.mcpServers.memory) throw new Error('Missing mcpServers.memory key');
          if (!cfg.mcpServers.memory.command) throw new Error('Missing command');
          if (!Array.isArray(cfg.mcpServers.memory.args)) throw new Error('args must be an array');
          console.log('Config structure OK');
          EOF

      - name: Check Super-Brain advanced config has all expected servers
        run: |
          node - <<'EOF'
          const cfg = JSON.parse(require('fs').readFileSync('integrations/claude-desktop/claude_desktop_config.advanced.json','utf8'));
          const expected = ['memory','sequential-thinking','filesystem','puppeteer','everything'];
          for (const k of expected) {
            if (!cfg.mcpServers || !cfg.mcpServers[k]) throw new Error('Missing server: ' + k);
            if (cfg.mcpServers[k].command !== 'npx') throw new Error('Server '+k+' must use npx (Super-Brain stack is npm-only)');
            if (!Array.isArray(cfg.mcpServers[k].args)) throw new Error('args must be array for: ' + k);
          }
          console.log('Advanced config structure OK -- all', expected.length, 'servers present');
          EOF

      - name: Reject npm-incompatible servers in advanced config
        run: |
          # fetch/time/git are PyPI-only; they must NOT appear in the npx-based advanced config.
          # If they're added, they should use 'uvx' as the command.
          node - <<'EOF'
          const cfg = JSON.parse(require('fs').readFileSync('integrations/claude-desktop/claude_desktop_config.advanced.json','utf8'));
          const pypiOnly = ['@modelcontextprotocol/server-fetch','@modelcontextprotocol/server-time','@modelcontextprotocol/server-git'];
          for (const [name, srv] of Object.entries(cfg.mcpServers)) {
            if (srv.command === 'npx' && srv.args.some(a => pypiOnly.includes(a))) {
              throw new Error('Server '+name+' uses npx for a PyPI-only package: '+srv.args.join(' '));
            }
          }
          console.log('No PyPI-only packages in npx commands.');
          EOF

      - name: Validate brain-visualizer.html
        run: |
          test -f integrations/claude-desktop/brain-visualizer.html
          # Basic sanity checks
          grep -q '<!doctype html>' integrations/claude-desktop/brain-visualizer.html
          grep -q 'three' integrations/claude-desktop/brain-visualizer.html
          grep -q 'parseMemory' integrations/claude-desktop/brain-visualizer.html
          # New v2 features
          grep -q 'colorForType' integrations/claude-desktop/brain-visualizer.html
          grep -q 'saveScreenshot' integrations/claude-desktop/brain-visualizer.html
          grep -q 'preserveDrawingBuffer' integrations/claude-desktop/brain-visualizer.html
          grep -q 'kb-help' integrations/claude-desktop/brain-visualizer.html
          grep -q 'tooltip' integrations/claude-desktop/brain-visualizer.html
          echo "brain-visualizer.html OK"

      - name: Check setup.sh and view-memory.sh have no syntax errors
        run: |
          chmod +x integrations/mcp-memory/setup.sh integrations/claude-desktop/view-memory.sh
          bash -n integrations/mcp-memory/setup.sh
          bash -n integrations/claude-desktop/view-memory.sh
          echo "scripts: syntax OK"

      - name: Smoke-test setup.sh --help
        run: |
          ./integrations/mcp-memory/setup.sh --help | grep -q -- "--advanced"
          ./integrations/mcp-memory/setup.sh --help | grep -q -- "--prewarm"
          ./integrations/mcp-memory/setup.sh --help | grep -q -- "--doctor"
          ./integrations/mcp-memory/setup.sh --help | grep -q -- "--uninstall"
          ./integrations/claude-desktop/view-memory.sh --help | grep -q -- "--stats"
          ./integrations/claude-desktop/view-memory.sh --help | grep -q -- "--search"
          ./integrations/claude-desktop/view-memory.sh --help | grep -q -- "--backup"
          ./integrations/claude-desktop/view-memory.sh --help | grep -q -- "--prune"
          echo "--help advertises new flags"

      - name: Smoke-test setup.sh (generic mode, no Node required)
        run: |
          # In generic mode the script only echoes information and checks for config files.
          # Node IS available on the runner, so we just verify it exits 0.
          ./integrations/mcp-memory/setup.sh
          echo "setup.sh generic mode OK"

      - name: Smoke-test setup.sh --claude-desktop (Linux path)
        run: |
          # Runs the Claude Desktop branch on Linux; creates ~/.config/Claude/claude_desktop_config.json
          ./integrations/mcp-memory/setup.sh --claude-desktop
          echo "setup.sh --claude-desktop OK"
          echo "--- Generated config ---"
          cat "$HOME/.config/Claude/claude_desktop_config.json"
          echo ""
          # Verify it's valid JSON with the expected structure
          node - <<'EOF'
          const path = process.env.HOME + '/.config/Claude/claude_desktop_config.json';
          const cfg = JSON.parse(require('fs').readFileSync(path, 'utf8'));
          if (!cfg.mcpServers || !cfg.mcpServers.memory) throw new Error('memory server missing from generated config');
          console.log('Generated config is valid.');
          EOF

      - name: Smoke-test setup.sh --claude-desktop --advanced (merging extra servers)
        run: |
          # Re-run with --advanced; should add the additional servers without dropping memory
          ./integrations/mcp-memory/setup.sh --claude-desktop --advanced
          echo "--- Merged config ---"
          cat "$HOME/.config/Claude/claude_desktop_config.json"
          echo ""
          node - <<'EOF'
          const path = process.env.HOME + '/.config/Claude/claude_desktop_config.json';
          const cfg = JSON.parse(require('fs').readFileSync(path, 'utf8'));
          const expected = ['memory','sequential-thinking','filesystem','puppeteer','everything'];
          for (const k of expected) {
            if (!cfg.mcpServers[k]) throw new Error('Missing server after --advanced: ' + k);
          }
          console.log('All', expected.length, 'advanced servers merged OK.');
          EOF

      - name: Smoke-test idempotency (re-run should not duplicate the entry)
        run: |
          # Second run should detect existing entries and keep them
          ./integrations/mcp-memory/setup.sh --claude-desktop --advanced
          node - <<'EOF'
          const path = process.env.HOME + '/.config/Claude/claude_desktop_config.json';
          const cfg = JSON.parse(require('fs').readFileSync(path, 'utf8'));
          const keys = Object.keys(cfg.mcpServers);
          // Each server name must appear exactly once
          const dupes = keys.filter((k, i) => keys.indexOf(k) !== i);
          if (dupes.length) throw new Error('Duplicate server keys: ' + dupes.join(','));
          console.log('Idempotency check passed.');
          EOF

      - name: Smoke-test setup.sh --doctor (healthy + broken cases)
        run: |
          # Seed a sample memory.json (JSONL format, same as the memory MCP server uses)
          mkdir -p "$HOME/.claude-memory"
          cat > "$HOME/.claude-memory/memory.json" <<'JSONL'
          {"type":"entity","name":"Alice","entityType":"person","observations":["likes TS"]}
          {"type":"entity","name":"Acme","entityType":"organization","observations":["startup"]}
          {"type":"relation","from":"Alice","to":"Acme","relationType":"works_at"}
          JSONL

          # 1) Healthy config from the previous step → exit 0
          ./integrations/mcp-memory/setup.sh --doctor
          echo "  ✓ doctor: healthy → exit 0"

          # 2) Inject the PyPI-via-npx footgun → doctor must catch it (exit 1)
          node - <<'EOF'
          const fs=require('fs'), p=process.env.HOME+'/.config/Claude/claude_desktop_config.json';
          const cfg=JSON.parse(fs.readFileSync(p,'utf8'));
          cfg.mcpServers.fetch={command:'npx',args:['-y','@modelcontextprotocol/server-fetch']};
          fs.writeFileSync(p, JSON.stringify(cfg,null,2));
          EOF
          if ./integrations/mcp-memory/setup.sh --doctor; then
            echo "  ✗ doctor should have flagged PyPI-via-npx"; exit 1
          else
            echo "  ✓ doctor: PyPI-via-npx → non-zero exit"
          fi

          # 3) Corrupt the config → doctor must catch it (exit 1)
          echo "{not valid" > "$HOME/.config/Claude/claude_desktop_config.json"
          if ./integrations/mcp-memory/setup.sh --doctor; then
            echo "  ✗ doctor should have flagged broken JSON"; exit 1
          else
            echo "  ✓ doctor: broken JSON → non-zero exit"
          fi

      - name: Smoke-test view-memory.sh CLI subcommands
        run: |
          # Reseed memory after the previous step's mutations
          mkdir -p "$HOME/.claude-memory"
          cat > "$HOME/.claude-memory/memory.json" <<'JSONL'
          {"type":"entity","name":"Alice","entityType":"person","observations":["likes TS"]}
          {"type":"entity","name":"Bob","entityType":"person","observations":["learning TS"]}
          {"type":"entity","name":"TypeScript","entityType":"language","observations":[]}
          {"type":"relation","from":"Alice","to":"TypeScript","relationType":"uses"}
          {"type":"relation","from":"Bob","to":"Alice","relationType":"colleague_of"}
          JSONL

          out=$(./integrations/claude-desktop/view-memory.sh --stats)
          echo "$out" | grep -q "Entities:     3"
          echo "$out" | grep -q "Relations:    2"
          echo "$out" | grep -q "Most-connected"
          echo "  ✓ --stats works"

          ./integrations/claude-desktop/view-memory.sh --types | grep -q "person"
          echo "  ✓ --types works"

          ./integrations/claude-desktop/view-memory.sh --search "TypeScript" | grep -q "Alice"
          echo "  ✓ --search finds matches"

          # No-match must exit non-zero
          if ./integrations/claude-desktop/view-memory.sh --search "definitely-not-there-xyzzy" >/dev/null; then
            echo "  ✗ --search with no matches should exit non-zero"; exit 1
          else
            echo "  ✓ --search no-match → non-zero exit"
          fi

          # Backup must produce a timestamped file
          ./integrations/claude-desktop/view-memory.sh --backup
          test -d "$HOME/.claude-memory/backups"
          n=$(find "$HOME/.claude-memory/backups" -name 'memory-*.json' | wc -l)
          test "$n" -ge 1
          echo "  ✓ --backup created file"

          # Bad option must exit non-zero
          if ./integrations/claude-desktop/view-memory.sh --bogus >/dev/null 2>&1; then
            echo "  ✗ unknown option should exit non-zero"; exit 1
          else
            echo "  ✓ unknown option → non-zero exit"
          fi

      - name: Smoke-test view-memory.sh --prune (dedupe + orphan removal)
        run: |
          # Memory with: duplicate Alice entity, duplicate observations,
          # duplicate relation, and an orphan relation to non-existent "Ghost".
          mkdir -p "$HOME/.claude-memory"
          cat > "$HOME/.claude-memory/memory.json" <<'JSONL'
          {"type":"entity","name":"Alice","entityType":"person","observations":["likes TS","likes TS","prefers vim"]}
          {"type":"entity","name":"Alice","entityType":"person","observations":["likes TS","drinks coffee"]}
          {"type":"entity","name":"Bob","entityType":"person","observations":["learning"]}
          {"type":"relation","from":"Alice","to":"Bob","relationType":"colleague_of"}
          {"type":"relation","from":"Alice","to":"Bob","relationType":"colleague_of"}
          {"type":"relation","from":"Alice","to":"Ghost","relationType":"knows"}
          JSONL
          BEFORE_LINES=$(wc -l < "$HOME/.claude-memory/memory.json")

          # Dry run must not modify the file
          ./integrations/claude-desktop/view-memory.sh --prune --dry-run > /tmp/prune_dry.txt
          grep -q "dry run" /tmp/prune_dry.txt
          DRY_LINES=$(wc -l < "$HOME/.claude-memory/memory.json")
          test "$DRY_LINES" -eq "$BEFORE_LINES"
          echo "  ✓ --dry-run leaves file unchanged"

          # Real prune
          ./integrations/claude-desktop/view-memory.sh --prune
          # Expect 2 entities + 1 relation = 3 lines
          AFTER_LINES=$(wc -l < "$HOME/.claude-memory/memory.json")
          test "$AFTER_LINES" -eq 3
          echo "  ✓ pruned 6 → 3 lines"

          # Pre-prune backup must exist
          ls "$HOME/.claude-memory/backups/"memory-pre-prune-*.json >/dev/null
          echo "  ✓ pre-prune backup created"

          # The orphan relation to Ghost must be gone, and Alice merged
          node - <<'EOF'
          const fs = require('fs');
          const lines = fs.readFileSync(process.env.HOME + '/.claude-memory/memory.json', 'utf8')
            .split(/\r?\n/).filter(Boolean).map(JSON.parse);
          const entities = lines.filter(o => o.type === 'entity');
          const relations = lines.filter(o => o.type === 'relation');
          if (entities.length !== 2) throw new Error('expected 2 entities, got ' + entities.length);
          if (relations.length !== 1) throw new Error('expected 1 relation, got ' + relations.length);
          if (relations.some(r => r.to === 'Ghost')) throw new Error('orphan relation not removed');
          const alice = entities.find(e => e.name === 'Alice');
          if (!alice) throw new Error('Alice missing');
          // Observations should be merged + deduped: likes TS, prefers vim, drinks coffee
          if (alice.observations.length !== 3) throw new Error('expected 3 obs, got ' + alice.observations.length);
          if (new Set(alice.observations).size !== alice.observations.length) throw new Error('duplicate observations remain');
          console.log('  ✓ semantic checks pass');
          EOF

      - name: Smoke-test setup.sh --uninstall (preserves user's other servers)
        run: |
          # Reinstall the advanced stack
          ./integrations/mcp-memory/setup.sh --claude-desktop --advanced >/dev/null

          # Add a user-defined server that must survive uninstall
          node - <<'EOF'
          const fs = require('fs');
          const p = process.env.HOME + '/.config/Claude/claude_desktop_config.json';
          const c = JSON.parse(fs.readFileSync(p, 'utf8'));
          c.mcpServers['my-custom'] = { command: 'node', args: ['/x.js'] };
          fs.writeFileSync(p, JSON.stringify(c, null, 2));
          EOF

          # Uninstall just memory
          ./integrations/mcp-memory/setup.sh --uninstall
          node - <<'EOF'
          const fs = require('fs');
          const c = JSON.parse(fs.readFileSync(process.env.HOME + '/.config/Claude/claude_desktop_config.json','utf8'));
          if (c.mcpServers.memory) throw new Error('memory should be gone');
          for (const k of ['sequential-thinking','filesystem','puppeteer','everything','my-custom']) {
            if (!c.mcpServers[k]) throw new Error('lost ' + k);
          }
          console.log('  ✓ memory removed; advanced stack and my-custom preserved');
          EOF

          # Uninstall the full advanced stack
          ./integrations/mcp-memory/setup.sh --uninstall --advanced
          node - <<'EOF'
          const fs = require('fs');
          const c = JSON.parse(fs.readFileSync(process.env.HOME + '/.config/Claude/claude_desktop_config.json','utf8'));
          for (const k of ['memory','sequential-thinking','filesystem','puppeteer','everything']) {
            if (c.mcpServers[k]) throw new Error(k + ' should be gone');
          }
          if (!c.mcpServers['my-custom']) throw new Error('my-custom must be preserved');
          if (Object.keys(c.mcpServers).length !== 1) throw new Error('expected exactly 1 remaining');
          console.log('  ✓ full stack removed; my-custom preserved');
          EOF

          # Backup files must exist
          ls "$HOME/.config/Claude/"claude_desktop_config.json.bak.* >/dev/null
          echo "  ✓ pre-uninstall backups present"

          # Round-trip: install → uninstall → install must be idempotent
          ./integrations/mcp-memory/setup.sh --claude-desktop >/dev/null
          ./integrations/mcp-memory/setup.sh --uninstall >/dev/null
          ./integrations/mcp-memory/setup.sh --claude-desktop >/dev/null
          node - <<'EOF'
          const fs = require('fs');
          const c = JSON.parse(fs.readFileSync(process.env.HOME + '/.config/Claude/claude_desktop_config.json','utf8'));
          if (!c.mcpServers.memory) throw new Error('memory missing after re-install');
          if (!c.mcpServers['my-custom']) throw new Error('my-custom lost across round-trip');
          console.log('  ✓ install→uninstall→install round-trip idempotent');
          EOF

          # Uninstall when no config exists must succeed cleanly
          rm -rf "$HOME/.config/Claude"
          ./integrations/mcp-memory/setup.sh --uninstall
          echo "  ✓ uninstall with no config → exit 0"