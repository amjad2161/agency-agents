name: MCP Memory Integration Tests

on:
  pull_request:
    paths:
      - "integrations/mcp-memory/**"
      - "runtime/agency/memory.py"
      - "runtime/agency/vector_memory.py"
      - "runtime/agency/lessons.py"
      - "runtime/tests/test_vector_memory.py"
      - "runtime/tests/test_lessons.py"
      - ".github/workflows/mcp-memory-tests.yml"
  push:
    branches: [main]
    paths:
      - "integrations/mcp-memory/**"
      - "runtime/agency/memory.py"
      - "runtime/agency/vector_memory.py"
      - "runtime/agency/lessons.py"
      - "runtime/tests/test_vector_memory.py"
      - "runtime/tests/test_lessons.py"
      - ".github/workflows/mcp-memory-tests.yml"

jobs:
  mcp-memory:
    name: Memory integration (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install runtime
        run: pip install -e runtime[dev]

      - name: Run memory tests
        run: python -m pytest runtime/tests/test_vector_memory.py runtime/tests/test_lessons.py -v
