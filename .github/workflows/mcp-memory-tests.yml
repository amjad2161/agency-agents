name: MCP Memory Integration Tests

on:
  pull_request:
    paths:
      - "integrations/mcp-memory/**"
      - "integrations/claude-desktop/**"
      - ".github/workflows/mcp-memory-tests.yml"
  push:
    branches: [main]
    paths:
      - "integrations/mcp-memory/**"
      - "integrations/claude-desktop/**"
      - ".github/workflows/mcp-memory-tests.yml"

jobs:
  validate:
    name: Validate MCP memory integration
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON config files
        run: |
          for f in integrations/claude-desktop/claude_desktop_config.json \
                   integrations/claude-desktop/claude_desktop_config.advanced.json; do
            echo "Checking $f..."
            CONFIG_FILE="$f" node -e "JSON.parse(require('fs').readFileSync(process.env.CONFIG_FILE,'utf8')); console.log('  Valid JSON');"
          done

      - name: Check required keys in claude_desktop_config.json
        run: |
          node - <<'EOF'
          const cfg = JSON.parse(require('fs').readFileSync('integrations/claude-desktop/claude_desktop_config.json','utf8'));
          if (!cfg.mcpServers) throw new Error('Missing mcpServers key');
          if (!cfg.mcpServers.memory) throw new Error('Missing mcpServers.memory key');
          if (!cfg.mcpServers.memory.command) throw new Error('Missing command');
          if (!Array.isArray(cfg.mcpServers.memory.args)) throw new Error('args must be an array');
          console.log('Config structure OK');
          EOF

      - name: Check Super-Brain advanced config has all expected servers
        run: |
          node - <<'EOF'
          const cfg = JSON.parse(require('fs').readFileSync('integrations/claude-desktop/claude_desktop_config.advanced.json','utf8'));
          const expected = ['memory','sequential-thinking','filesystem','fetch','time'];
          for (const k of expected) {
            if (!cfg.mcpServers || !cfg.mcpServers[k]) throw new Error('Missing server: ' + k);
            if (!cfg.mcpServers[k].command) throw new Error('Missing command for: ' + k);
            if (!Array.isArray(cfg.mcpServers[k].args)) throw new Error('args must be array for: ' + k);
          }
          console.log('Advanced config structure OK -- all', expected.length, 'servers present');
          EOF

      - name: Validate brain-visualizer.html
        run: |
          test -f integrations/claude-desktop/brain-visualizer.html
          # Basic sanity checks: must be HTML and contain three.js + memory parsing
          grep -q '<!doctype html>' integrations/claude-desktop/brain-visualizer.html
          grep -q 'three' integrations/claude-desktop/brain-visualizer.html
          grep -q 'parseMemory' integrations/claude-desktop/brain-visualizer.html
          echo "brain-visualizer.html OK"

      - name: Check setup.sh and view-memory.sh have no syntax errors
        run: |
          chmod +x integrations/mcp-memory/setup.sh integrations/claude-desktop/view-memory.sh
          bash -n integrations/mcp-memory/setup.sh
          bash -n integrations/claude-desktop/view-memory.sh
          echo "scripts: syntax OK"

      - name: Smoke-test setup.sh --help
        run: |
          ./integrations/mcp-memory/setup.sh --help | grep -q -- "--advanced"
          ./integrations/mcp-memory/setup.sh --help | grep -q -- "--prewarm"
          echo "--help advertises new flags"

      - name: Smoke-test setup.sh (generic mode, no Node required)
        run: |
          # In generic mode the script only echoes information and checks for config files.
          # Node IS available on the runner, so we just verify it exits 0.
          ./integrations/mcp-memory/setup.sh
          echo "setup.sh generic mode OK"

      - name: Smoke-test setup.sh --claude-desktop (Linux path)
        run: |
          # Runs the Claude Desktop branch on Linux; creates ~/.config/Claude/claude_desktop_config.json
          ./integrations/mcp-memory/setup.sh --claude-desktop
          echo "setup.sh --claude-desktop OK"
          echo "--- Generated config ---"
          cat "$HOME/.config/Claude/claude_desktop_config.json"
          echo ""
          # Verify it's valid JSON with the expected structure
          node - <<'EOF'
          const path = process.env.HOME + '/.config/Claude/claude_desktop_config.json';
          const cfg = JSON.parse(require('fs').readFileSync(path, 'utf8'));
          if (!cfg.mcpServers || !cfg.mcpServers.memory) throw new Error('memory server missing from generated config');
          console.log('Generated config is valid.');
          EOF

      - name: Smoke-test setup.sh --claude-desktop --advanced (merging extra servers)
        run: |
          # Re-run with --advanced; should add the additional servers without dropping memory
          ./integrations/mcp-memory/setup.sh --claude-desktop --advanced
          echo "--- Merged config ---"
          cat "$HOME/.config/Claude/claude_desktop_config.json"
          echo ""
          node - <<'EOF'
          const path = process.env.HOME + '/.config/Claude/claude_desktop_config.json';
          const cfg = JSON.parse(require('fs').readFileSync(path, 'utf8'));
          const expected = ['memory','sequential-thinking','filesystem','fetch','time'];
          for (const k of expected) {
            if (!cfg.mcpServers[k]) throw new Error('Missing server after --advanced: ' + k);
          }
          console.log('All advanced servers merged OK.');
          EOF

      - name: Smoke-test idempotency (re-run should not duplicate the entry)
        run: |
          # Second run should detect existing entries and keep them
          ./integrations/mcp-memory/setup.sh --claude-desktop --advanced
          node - <<'EOF'
          const path = process.env.HOME + '/.config/Claude/claude_desktop_config.json';
          const cfg = JSON.parse(require('fs').readFileSync(path, 'utf8'));
          const keys = Object.keys(cfg.mcpServers);
          // Each server name must appear exactly once
          const dupes = keys.filter((k, i) => keys.indexOf(k) !== i);
          if (dupes.length) throw new Error('Duplicate server keys: ' + dupes.join(','));
          console.log('Idempotency check passed.');
          EOF