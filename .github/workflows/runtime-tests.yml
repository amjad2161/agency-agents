name: Runtime tests

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  runtime-tests:
    name: Runtime tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pytest pytest-timeout pytest-asyncio
          pip install -e runtime || pip install pyyaml click httpx pydantic
          pip install ezdxf || true
          pip install pypdf python-docx openpyxl flask requests || true

      - name: Run runtime tests
        env:
          PYTHONPATH: ${{ github.workspace }}/runtime:${{ github.workspace }}
          ANTHROPIC_API_KEY: ""
        run: python -m pytest runtime/tests -q --timeout=30 --tb=short

      - name: Run bridge tests
        env:
          PYTHONPATH: ${{ github.workspace }}/runtime:${{ github.workspace }}
          ANTHROPIC_API_KEY: ""
        run: python -m pytest tests -q --timeout=30 --tb=short
