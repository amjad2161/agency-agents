name: Runtime tests

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime-tests:
    name: Runtime tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pytest pytest-timeout pytest-asyncio

      - name: Install optional dependencies (best-effort)
        continue-on-error: true
        run: |
          pip install pyyaml click httpx pydantic
          pip install pypdf python-docx openpyxl flask requests
          pip install ezdxf

      - name: Show environment
        run: |
          python --version
          pip list | head -40
          echo "PYTHONPATH=$GITHUB_WORKSPACE/runtime:$GITHUB_WORKSPACE"

      - name: Run runtime/ tests
        env:
          PYTHONPATH: ${{ github.workspace }}/runtime:${{ github.workspace }}
          ANTHROPIC_API_KEY: ""
        run: |
          python -m pytest runtime/ -q --timeout=30 --tb=short -p no:warnings

      - name: Run tests/ (bridge + nav improvement rounds)
        env:
          PYTHONPATH: ${{ github.workspace }}/runtime:${{ github.workspace }}
          ANTHROPIC_API_KEY: ""
        run: |
          python -m pytest tests/ -q --timeout=30 --tb=short -p no:warnings
