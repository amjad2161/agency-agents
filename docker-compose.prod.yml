# ═══════════════════════════════════════════════════════════════════════════
# JARVIS — Production / Cloud overrides
# ═══════════════════════════════════════════════════════════════════════════
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file layers on top of docker-compose.yml:
#   - Removes dev source bind-mounts so the pulled image code runs (not host)
#   - Applies resource limits using plain Compose fields (mem_limit, cpus)
#   - Uses restart: always and tighter logging
#   - Sets trust mode to off (safest default for production)
#   - Binds persistent state to a host path you control

version: "3.9"

services:
  jarvis:
    restart: always
    # Override volumes: drop dev source bind-mounts so `docker compose pull`
    # actually updates the running code (image code wins, not host files).
    volumes:
      - jarvis_data:/root/.agency
    environment:
      JARVIS_ENV: production
      # Trust mode: off | on-my-machine | yolo  (off = safest for production)
      AGENCY_TRUST_MODE: ${AGENCY_TRUST_MODE:-off}
    # Plain Compose resource limits (docker compose, not Swarm)
    mem_limit: 2g
    cpus: "2.0"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    labels:
      jarvis.env: "production"
      com.centurylinklabs.watchtower.enable: "true"

  jarvis-sync:
    restart: always
    # Drop the dev scripts bind-mount: use the version baked into the image
    volumes:
      - jarvis_data:/root/.agency
    mem_limit: 256m
    cpus: "0.25"
    labels:
      com.centurylinklabs.watchtower.enable: "true"

volumes:
  jarvis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${JARVIS_DATA_PATH:-/opt/jarvis/data}
