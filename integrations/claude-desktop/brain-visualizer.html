<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>🧠 Claude Memory Brain · 3D Knowledge Graph</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin:0; padding:0; height:100%; background:#05060d;
    font:13px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    color:#dde; overflow:hidden; }
  #stage { position:fixed; inset:0; }
  canvas { display:block; }

  /* HUD panels */
  #hud { position:fixed; top:16px; left:16px; width:340px; max-height:calc(100vh - 32px);
    background:linear-gradient(160deg, rgba(10,14,32,0.92), rgba(8,10,24,0.85));
    border:1px solid #2a3a6a; border-radius:14px; padding:18px 18px 14px;
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    box-shadow:0 12px 60px rgba(0,180,255,0.10),0 2px 10px rgba(0,0,0,0.6);
    z-index:20; overflow:auto; }
  #hud h1 { margin:0 0 4px; font-size:14px; letter-spacing:0.18em;
    color:#6ae0ff; text-transform:uppercase; }
  #hud .sub { color:#7a85b0; font-size:11px; margin-bottom:14px; }

  .stat-row { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
  .stat { flex:1; min-width:88px; background:#0d1230; border:1px solid #1f2c5a;
    border-radius:8px; padding:8px 10px; }
  .stat .v { font-size:18px; color:#aef0ff; font-weight:600; line-height:1.1; }
  .stat .l { font-size:10px; color:#7a85b0; text-transform:uppercase;
    letter-spacing:0.08em; margin-top:2px; }

  .row { display:flex; gap:6px; margin-bottom:8px; }
  input[type=text], input[type=file], button, select {
    background:#0a0f24; color:#dde; border:1px solid #2a3a6a; border-radius:6px;
    padding:6px 9px; font-size:12px; outline:none; transition:border-color .15s; }
  input[type=text] { flex:1; }
  input[type=text]:focus, select:focus { border-color:#6ae0ff; }
  button { cursor:pointer; transition:all .15s; }
  button:hover { background:#1a2454; border-color:#6ae0ff; color:#aef0ff; }
  button.primary { background:#1a2454; color:#aef0ff; border-color:#3a5aaa; }
  button.primary:hover { background:#2a3a8a; }

  #legend { font-size:11px; color:#7a85b0; margin-top:12px;
    padding-top:12px; border-top:1px solid #1f2c5a; }
  #legend .dot { display:inline-block; width:8px; height:8px; border-radius:50%;
    margin-right:6px; vertical-align:middle; }

  #info { position:fixed; bottom:16px; right:16px; max-width:380px;
    background:rgba(10,14,32,0.92); border:1px solid #2a3a6a; border-radius:10px;
    padding:12px 14px; backdrop-filter:blur(12px); display:none; z-index:20; }
  #info h3 { margin:0 0 6px; font-size:13px; color:#aef0ff; }
  #info .obs { font-size:11px; color:#9aa5cc; margin-top:6px;
    max-height:140px; overflow:auto; }

  #help { position:fixed; bottom:14px; left:16px; font-size:10px;
    color:#5a6595; letter-spacing:0.04em; pointer-events:none; }

  .empty { padding:30px 16px; text-align:center; color:#7a85b0;
    font-size:12px; line-height:1.6; }
  .empty code { background:#0a0f24; padding:2px 6px; border-radius:4px;
    color:#aef0ff; border:1px solid #1f2c5a; }
</style>
</head>
<body>
<div id="stage"></div>

<div id="hud">
  <h1>🧠 Memory Brain</h1>
  <div class="sub">Interactive 3D knowledge graph viewer</div>

  <div class="stat-row">
    <div class="stat"><div class="v" id="stat-entities">0</div><div class="l">Entities</div></div>
    <div class="stat"><div class="v" id="stat-relations">0</div><div class="l">Relations</div></div>
    <div class="stat"><div class="v" id="stat-obs">0</div><div class="l">Observations</div></div>
  </div>

  <div class="row">
    <input type="text" id="search" placeholder="🔍 Search entities..." />
  </div>

  <div class="row">
    <input type="file" id="file" accept=".json,.jsonl" style="display:none" />
    <button class="primary" id="load-default" style="flex:1">Load default</button>
    <button id="pick" title="Pick a memory.json file">📁</button>
  </div>

  <div class="row">
    <button id="reset-cam" style="flex:1">Reset view</button>
    <button id="toggle-spin">⏸ Pause</button>
  </div>

  <div id="legend">
    <div><span class="dot" style="background:#6ae0ff"></span>Entity node</div>
    <div><span class="dot" style="background:#f0a86a"></span>Highlighted (search)</div>
    <div><span class="dot" style="background:#a06af0"></span>Selected node</div>
    <div style="margin-top:6px">Drag = orbit · Wheel = zoom · Click node = details</div>
  </div>
</div>

<div id="info"></div>
<div id="help">three.js · WebGL · zero install · 100% local</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ---------- Scene ----------
const stage = document.getElementById('stage');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
stage.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05060d);
scene.fog = new THREE.Fog(0x05060d, 60, 220);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 600);
camera.position.set(0, 0, 80);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.4;

// Subtle ambient glow + key light
scene.add(new THREE.AmbientLight(0x6688cc, 0.55));
const key = new THREE.PointLight(0x6ae0ff, 1.2, 220);
key.position.set(40, 40, 80);
scene.add(key);
const rim = new THREE.PointLight(0xa06af0, 0.7, 220);
rim.position.set(-50, -30, -40);
scene.add(rim);

// Starfield backdrop
{
  const g = new THREE.BufferGeometry();
  const N = 600;
  const pos = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const r = 240 + Math.random() * 60;
    const t = Math.random() * Math.PI * 2;
    const p = Math.acos(2 * Math.random() - 1);
    pos[i*3]   = r * Math.sin(p) * Math.cos(t);
    pos[i*3+1] = r * Math.sin(p) * Math.sin(t);
    pos[i*3+2] = r * Math.cos(p);
  }
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const m = new THREE.PointsMaterial({ color: 0x335577, size: 0.6, sizeAttenuation: true });
  scene.add(new THREE.Points(g, m));
}

// ---------- Graph state ----------
let nodes = [];   // {id, name, type, obs:[], mesh, label, sphere}
let edges = [];   // {a, b, line, type}
let selectedId = null;
let highlightSet = new Set();

const NODE_COLOR = 0x6ae0ff;
const NODE_HIGHLIGHT = 0xf0a86a;
const NODE_SELECTED = 0xa06af0;

const labelTextureCache = new Map();
function makeLabelSprite(text) {
  if (labelTextureCache.has(text)) {
    const tex = labelTextureCache.get(text);
    const mat = new THREE.SpriteMaterial({ map: tex, depthTest: false, transparent: true });
    const s = new THREE.Sprite(mat);
    s.scale.set(8, 2, 1);
    return s;
  }
  const c = document.createElement('canvas');
  c.width = 256; c.height = 64;
  const ctx = c.getContext('2d');
  ctx.font = '600 24px -apple-system, system-ui, sans-serif';
  ctx.fillStyle = '#dde6ff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(10,14,32,0.95)';
  ctx.shadowBlur = 6;
  ctx.fillText(text.length > 22 ? text.slice(0, 21) + '…' : text, 128, 32);
  const tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  labelTextureCache.set(text, tex);
  const mat = new THREE.SpriteMaterial({ map: tex, depthTest: false, transparent: true });
  const s = new THREE.Sprite(mat);
  s.scale.set(8, 2, 1);
  return s;
}

function clearGraph() {
  nodes.forEach(n => {
    scene.remove(n.sphere); n.sphere.geometry.dispose(); n.sphere.material.dispose();
    if (n.label) scene.remove(n.label);
  });
  edges.forEach(e => {
    scene.remove(e.line); e.line.geometry.dispose(); e.line.material.dispose();
  });
  nodes = []; edges = []; selectedId = null;
  document.getElementById('info').style.display = 'none';
}

function buildGraph(entities, relations) {
  clearGraph();
  // Position entities on a fibonacci sphere (uniform distribution)
  const N = entities.length;
  const R = Math.max(20, Math.min(60, 8 + N * 0.6));
  const golden = Math.PI * (3 - Math.sqrt(5));
  const sphereGeo = new THREE.SphereGeometry(0.9, 20, 16);

  entities.forEach((e, i) => {
    const y = 1 - (i / Math.max(1, N - 1)) * 2;
    const r = Math.sqrt(1 - y * y);
    const theta = golden * i;
    const x = Math.cos(theta) * r;
    const z = Math.sin(theta) * r;

    const mat = new THREE.MeshStandardMaterial({
      color: NODE_COLOR, emissive: NODE_COLOR, emissiveIntensity: 0.45,
      metalness: 0.4, roughness: 0.3
    });
    const sphere = new THREE.Mesh(sphereGeo, mat);
    sphere.position.set(x * R, y * R, z * R);
    sphere.userData.id = e.name;
    scene.add(sphere);

    const label = makeLabelSprite(e.name);
    label.position.copy(sphere.position).add(new THREE.Vector3(0, 1.8, 0));
    scene.add(label);

    nodes.push({
      id: e.name, name: e.name, type: e.entityType || 'entity',
      obs: e.observations || [], sphere, label
    });
  });

  const idIndex = new Map(nodes.map(n => [n.id, n]));

  relations.forEach(r => {
    const a = idIndex.get(r.from);
    const b = idIndex.get(r.to);
    if (!a || !b) return;
    const g = new THREE.BufferGeometry().setFromPoints([a.sphere.position, b.sphere.position]);
    const m = new THREE.LineBasicMaterial({
      color: 0x335c8a, transparent: true, opacity: 0.55
    });
    const line = new THREE.Line(g, m);
    scene.add(line);
    edges.push({ a: a.id, b: b.id, line, type: r.relationType || '' });
  });

  // Update HUD stats
  document.getElementById('stat-entities').textContent = nodes.length;
  document.getElementById('stat-relations').textContent = edges.length;
  document.getElementById('stat-obs').textContent =
    nodes.reduce((s, n) => s + (n.obs?.length || 0), 0);
}

// ---------- Memory parsing ----------
// Supports the @modelcontextprotocol/server-memory format:
//   - JSONL: each line is an object with type=entity|relation
//   - JSON: { entities: [...], relations: [...] }
function parseMemory(text) {
  const trimmed = text.trim();
  if (!trimmed) return { entities: [], relations: [] };
  // Try JSONL first
  if (trimmed.startsWith('{') && trimmed.includes('\n{')) {
    const entities = [], relations = [];
    for (const raw of trimmed.split('\n')) {
      const line = raw.trim();
      if (!line) continue;
      try {
        const obj = JSON.parse(line);
        if (obj.type === 'entity') entities.push(obj);
        else if (obj.type === 'relation') relations.push(obj);
      } catch { /* skip malformed */ }
    }
    return { entities, relations };
  }
  // Try plain JSON
  try {
    const obj = JSON.parse(trimmed);
    return {
      entities: obj.entities || [],
      relations: obj.relations || []
    };
  } catch {
    return { entities: [], relations: [] };
  }
}

// ---------- Default loader (sample data when no file) ----------
function sampleMemory() {
  return {
    entities: [
      { name: 'Amjad', entityType: 'person', observations: ['Repository owner', 'Uses Claude Desktop'] },
      { name: 'Agency Agents', entityType: 'project', observations: ['340+ AI agents', 'MIT licensed'] },
      { name: 'Claude Desktop', entityType: 'tool', observations: ['MCP host', 'Persistent memory via local server'] },
      { name: 'MCP Memory', entityType: 'service', observations: ['Knowledge graph backend', 'Saves credits'] },
      { name: 'TypeScript', entityType: 'language', observations: ['Preferred over JavaScript'] },
      { name: 'JARVIS', entityType: 'sub-system', observations: ['Meta-orchestrator'] },
      { name: 'Brain Visualizer', entityType: 'tool', observations: ['You are looking at it'] }
    ],
    relations: [
      { from: 'Amjad', to: 'Agency Agents', relationType: 'owns' },
      { from: 'Amjad', to: 'Claude Desktop', relationType: 'uses' },
      { from: 'Claude Desktop', to: 'MCP Memory', relationType: 'connects-to' },
      { from: 'MCP Memory', to: 'Brain Visualizer', relationType: 'visualized-by' },
      { from: 'Agency Agents', to: 'JARVIS', relationType: 'contains' },
      { from: 'Agency Agents', to: 'Brain Visualizer', relationType: 'ships' },
      { from: 'Amjad', to: 'TypeScript', relationType: 'prefers' }
    ]
  };
}

async function loadDefault() {
  // Try a co-located memory.json (e.g., user copied it next to the HTML).
  // The OS-default ~/.claude-memory/memory.json can't be reached over file:// for
  // security reasons — users should use the 📁 file picker instead.
  try {
    const r = await fetch('./memory.json', { cache: 'no-store' });
    if (r.ok) {
      const t = await r.text();
      const parsed = parseMemory(t);
      if (parsed.entities.length) {
        buildGraph(parsed.entities, parsed.relations);
        return;
      }
    }
  } catch { /* fall through to sample */ }

  const s = sampleMemory();
  buildGraph(s.entities, s.relations);
  showToast('Loaded sample data. Click 📁 to load your ~/.claude-memory/memory.json');
}

// ---------- Search ----------
function applySearch(query) {
  const q = query.trim().toLowerCase();
  highlightSet = new Set();
  nodes.forEach(n => {
    const matches = q && (
      n.name.toLowerCase().includes(q) ||
      n.type.toLowerCase().includes(q) ||
      (n.obs || []).some(o => String(o).toLowerCase().includes(q))
    );
    if (matches) highlightSet.add(n.id);
    const c = (n.id === selectedId) ? NODE_SELECTED
      : (matches ? NODE_HIGHLIGHT : NODE_COLOR);
    n.sphere.material.color.setHex(c);
    n.sphere.material.emissive.setHex(c);
    n.sphere.scale.setScalar(matches ? 1.6 : 1.0);
  });
}

// ---------- Selection / picking ----------
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
function onPointerDown(ev) {
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const meshes = nodes.map(n => n.sphere);
  const hits = raycaster.intersectObjects(meshes, false);
  if (hits.length) {
    const id = hits[0].object.userData.id;
    selectNode(id);
  }
}
renderer.domElement.addEventListener('pointerdown', onPointerDown);

function selectNode(id) {
  selectedId = id;
  const n = nodes.find(x => x.id === id);
  if (!n) return;
  applySearch(document.getElementById('search').value);

  const info = document.getElementById('info');
  const connected = edges
    .filter(e => e.a === id || e.b === id)
    .map(e => {
      const other = e.a === id ? e.b : e.a;
      const arrow = e.a === id ? '→' : '←';
      return `<div style="color:#9aa5cc">${arrow} ${escapeHtml(e.type)} <span style="color:#aef0ff">${escapeHtml(other)}</span></div>`;
    });
  info.innerHTML = `
    <h3>${escapeHtml(n.name)}</h3>
    <div style="font-size:11px;color:#7a85b0">type: ${escapeHtml(n.type)}</div>
    ${(n.obs || []).length ? `<div class="obs">${n.obs.map(o => `• ${escapeHtml(String(o))}`).join('<br>')}</div>` : ''}
    ${connected.length ? `<div style="margin-top:8px;font-size:11px;border-top:1px solid #1f2c5a;padding-top:8px">${connected.join('')}</div>` : ''}
  `;
  info.style.display = 'block';
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---------- Toast ----------
let toastTimer;
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div'); t.id = 'toast';
    t.style.cssText = 'position:fixed;top:16px;left:50%;transform:translateX(-50%);' +
      'background:rgba(10,14,32,0.95);border:1px solid #2a3a6a;border-radius:8px;' +
      'padding:8px 14px;font-size:12px;color:#aef0ff;z-index:30;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.style.display = 'none', 3500);
}

// ---------- UI wiring ----------
document.getElementById('search').addEventListener('input', e => applySearch(e.target.value));
document.getElementById('load-default').addEventListener('click', loadDefault);
document.getElementById('pick').addEventListener('click',
  () => document.getElementById('file').click());
document.getElementById('file').addEventListener('change', async e => {
  const f = e.target.files[0];
  if (!f) return;
  const text = await f.text();
  const parsed = parseMemory(text);
  if (!parsed.entities.length) {
    showToast('No entities found in this file.');
    return;
  }
  buildGraph(parsed.entities, parsed.relations);
  showToast(`Loaded ${parsed.entities.length} entities · ${parsed.relations.length} relations`);
});
document.getElementById('reset-cam').addEventListener('click', () => {
  camera.position.set(0, 0, 80);
  controls.target.set(0, 0, 0);
  controls.update();
});
document.getElementById('toggle-spin').addEventListener('click', e => {
  controls.autoRotate = !controls.autoRotate;
  e.target.textContent = controls.autoRotate ? '⏸ Pause' : '▶ Spin';
});

// ---------- Resize / animate ----------
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
  controls.update();
  // Pulse highlighted nodes
  const t = performance.now() * 0.003;
  nodes.forEach(n => {
    if (highlightSet.has(n.id) || n.id === selectedId) {
      const p = 1 + Math.sin(t * 2) * 0.1;
      n.sphere.scale.setScalar((n.id === selectedId ? 1.8 : 1.6) * p);
    }
  });
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();

// Boot
loadDefault();
</script>
</body>
</html>
